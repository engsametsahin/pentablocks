  <rect width="1200" height="630" fill="url(#bg)" />

  <g opacity="0.2">
    <rect x="72" y="70" width="48" height="48" rx="8" fill="#10b981" />
    <rect x="124" y="70" width="48" height="48" rx="8" fill="#10b981" />
    <rect x="176" y="70" width="48" height="48" rx="8" fill="#10b981" />
    <rect x="176" y="122" width="48" height="48" rx="8" fill="#10b981" />
